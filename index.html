<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Эхо Затухающих Маяков</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:Georgia,serif;cursor:none;-webkit-user-select:none;user-select:none}
canvas{display:block}

/* ─── CRT / VHS overlay ─── */
#crt{position:fixed;inset:0;pointer-events:none;z-index:200;mix-blend-mode:normal}
#crt::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.15) 0px,transparent 1px,transparent 2px);
  animation:scanlines .08s steps(1) infinite;pointer-events:none}
#crt::after{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.65) 100%);
  pointer-events:none}
@keyframes scanlines{0%{transform:translateY(0)}100%{transform:translateY(2px)}}

/* ─── Noise grain ─── */
#grain{position:fixed;inset:0;pointer-events:none;z-index:199;opacity:.07;mix-blend-mode:overlay}

/* ─── Loading ─── */
#loading{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity 1.5s}
#loading.fade{opacity:0;pointer-events:none}
#loading h1{color:#c4a35a;font-size:2.4em;letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px;text-shadow:0 0 30px rgba(196,163,90,.3)}
#loading .sub{color:#667;font-size:.95em;font-style:italic;margin-bottom:36px}
#loading .bar{width:280px;height:2px;background:#1a1a1a;border-radius:2px}
#loading .fill{height:100%;background:#c4a35a;width:0%;border-radius:2px;transition:width .3s}
#loading .status{color:#444;font-size:.7em;margin-top:12px;letter-spacing:.1em}

/* ─── Start ─── */
#start{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:900;cursor:pointer}
#start h2{color:#c4a35a;font-size:1.6em;margin-bottom:12px;animation:pulse 2s ease-in-out infinite}
#start p{color:#556;font-size:.85em}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

/* ─── HUD ─── */
#hud{position:fixed;inset:0;pointer-events:none;z-index:100}
#cross{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;border:1px solid rgba(200,200,200,.35);border-radius:50%}
#sbar{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);width:180px;height:2px;background:rgba(20,20,30,.6);border-radius:2px;opacity:0;transition:opacity .5s}
#sbar.on{opacity:1}
#sfill{height:100%;background:linear-gradient(90deg,#a33,#c4a35a);width:100%;border-radius:2px;transition:width .5s}
#slbl{position:absolute;bottom:35px;left:50%;transform:translateX(-50%);color:rgba(150,130,100,.45);font-size:.6em;letter-spacing:.2em;text-transform:uppercase;opacity:0;transition:opacity .5s}
#slbl.on{opacity:1}
#prompt{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);color:rgba(196,163,90,.8);font-size:.8em;letter-spacing:.1em;opacity:0;transition:opacity .3s;text-shadow:0 0 8px rgba(0,0,0,.9)}
#prompt.on{opacity:1}
#sub{position:absolute;bottom:110px;left:50%;transform:translateX(-50%);color:rgba(200,190,170,.85);font-size:.95em;max-width:550px;text-align:center;font-style:italic;opacity:0;transition:opacity .8s;text-shadow:0 0 15px rgba(0,0,0,.9)}
#sub.on{opacity:1}
#chap{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#c4a35a;font-size:2em;letter-spacing:.2em;text-transform:uppercase;opacity:0;z-index:250;pointer-events:none;text-shadow:0 0 40px rgba(196,163,90,.3);transition:opacity 2s}
#finfo{position:absolute;bottom:28px;right:28px;color:rgba(150,140,120,.35);font-size:.65em;letter-spacing:.1em}

/* ─── Blink ─── */
#blink{position:fixed;inset:0;background:#000;pointer-events:none;z-index:180;opacity:0}

/* ─── Pause ─── */
#pause{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:500}
#pause button{background:none;border:1px solid #444;color:#998;font-family:Georgia,serif;font-size:1.05em;padding:10px 36px;margin:7px;cursor:pointer;letter-spacing:.1em;transition:all .3s}
#pause button:hover{border-color:#c4a35a;color:#c4a35a}
</style>
</head>
<body>
<div id="crt"></div>
<canvas id="grain"></canvas>

<div id="loading">
  <h1>Эхо Затухающих Маяков</h1>
  <div class="sub">Глава I — Прибытие</div>
  <div class="bar"><div class="fill" id="lbar"></div></div>
  <div class="status" id="lstatus">загрузка...</div>
</div>

<div id="start">
  <h2>Нажмите, чтобы начать</h2>
  <p>🎧 Наденьте наушники</p>
</div>

<div id="hud">
  <div id="cross"></div>
  <div id="slbl">Рассудок</div>
  <div id="sbar"><div id="sfill"></div></div>
  <div id="prompt"></div>
  <div id="sub"></div>
  <div id="finfo">[F] Фонарь</div>
</div>
<div id="chap"></div>
<div id="blink"></div>

<div id="pause">
  <button id="btnR">Продолжить</button>
  <button id="btnE">Выход</button>
</div>

<!-- Three.js via classic script tag (not module) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.min.js"></script>
<script>
"use strict";

// ════════════════════════════════════════════
//  GRAIN CANVAS — animated noise
// ════════════════════════════════════════════
(function initGrain(){
  var c=document.getElementById('grain'),x=c.getContext('2d');
  c.width=256;c.height=256;
  function draw(){
    var d=x.createImageData(256,256),p=d.data;
    for(var i=0;i<p.length;i+=4){var v=Math.random()*255|0;p[i]=p[i+1]=p[i+2]=v;p[i+3]=255;}
    x.putImageData(d,0,0);requestAnimationFrame(draw);
  }
  draw();
})();

// ════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════
var S={
  loaded:false,started:false,paused:false,locked:false,
  sanity:100,flashOn:false,battery:100,
  lighthouseOn:false,doorEvent:false,firstScare:false,
  gameTime:16,timeSpeed:.15,night:false,
  speed:3.2,sprint:5,sprinting:false,bobPh:0,breath:0,
  keys:{},yaw:0,pitch:0,
  nearItem:null,scareT:0,whisperT:0
};

// ════════════════════════════════════════════
//  AUDIO — procedural
// ════════════════════════════════════════════
var AU={ctx:null,g:{}};
function audioInit(){
  AU.ctx=new(window.AudioContext||window.webkitAudioContext)();
  AU.master=AU.ctx.createGain();AU.master.gain.value=.65;AU.master.connect(AU.ctx.destination);
  ['amb','sfx','hor'].forEach(function(c){AU.g[c]=AU.ctx.createGain();AU.g[c].connect(AU.master);});
  AU.g.amb.gain.value=.4;AU.g.sfx.gain.value=.55;AU.g.hor.gain.value=.45;
}
function genBuf(dur,ch,fn){
  var sr=AU.ctx.sampleRate,len=sr*dur|0,buf=AU.ctx.createBuffer(ch,len,sr);
  for(var c=0;c<ch;c++){var d=buf.getChannelData(c);fn(d,len,sr,c);}return buf;
}
function genWind(){return genBuf(4,2,function(d,n,sr,ch){var v=0;for(var i=0;i<n;i++){v+=(Math.random()*2-1-v)*.003;var g=Math.sin(i/sr*.7+ch)*.5+.5;d[i]=v*g*3*Math.sin(Math.PI*i/n);}});}
function genRain(){return genBuf(3,2,function(d,n,sr){for(var i=0;i<n;i++){d[i]=(Math.random()<.15?(Math.random()-.5)*.5:0)+(Math.random()*2-1)*.07;}});}
function genWaves(){return genBuf(5,2,function(d,n,sr,ch){var v=0;for(var i=0;i<n;i++){v+=(Math.random()*2-1-v)*.002;var w=Math.sin(i/sr*.4+ch*.5)*.5+.5;d[i]=v*w*2*.35;}});}
function genCreak(){return genBuf(1.5,1,function(d,n,sr){for(var i=0;i<n;i++){var t=i/sr,f=80+Math.sin(t*3)*40,e=Math.exp(-t*2)*Math.sin(Math.PI*t/1.5);d[i]=(Math.sin(t*f*6.28)+((Math.random()-.5)*.3))*e*.25;}});}
function genThunder(){return genBuf(3,2,function(d,n,sr){var v=0;for(var i=0;i<n;i++){var t=i/sr;v+=(Math.random()*2-1-v)*.01;var c=t<.1?Math.sin(t*800)*(1-t*10):0;d[i]=(c*.7+v*Math.exp(-t*1.5)*4)*.45;}});}
function genScratch(){return genBuf(2,1,function(d,n,sr){for(var i=0;i<n;i++){var t=i/sr,b=Math.random()<.03?1:0;d[i]=(Math.sin(t*(200+Math.sin(t*5)*100))*.08+(Math.random()-.5)*b*.35)*Math.sin(Math.PI*t/2*3)*.4;}});}
function genHeart(){return genBuf(1,1,function(d,n,sr){for(var i=0;i<n;i++){var t=i/sr;var b1=Math.exp(-Math.pow((t-.1)*20,2))*Math.sin(t*60*6.28);var b2=Math.exp(-Math.pow((t-.3)*20,2))*Math.sin(t*50*6.28);d[i]=(b1+b2*.7)*.35;}});}
function genWhisper(){return genBuf(2,2,function(d,n,sr,ch){for(var i=0;i<n;i++){var t=i/sr,e=Math.sin(Math.PI*t/2);d[i]=((Math.random()-.5)*.12+Math.sin(t*(300+ch*50)*6.28)*.04)*e;}});}

function auPlay(buf,cat,loop,vol){
  var s=AU.ctx.createBufferSource();s.buffer=buf;s.loop=!!loop;
  var g=AU.ctx.createGain();g.gain.value=vol||1;
  s.connect(g);g.connect(AU.g[cat||'sfx']);s.start();return{s:s,g:g};
}

// ════════════════════════════════════════════
//  THREE.JS SETUP
// ════════════════════════════════════════════
var renderer=new THREE.WebGLRenderer({antialias:false,powerPreference:'default'});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,1.5));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=.7;
renderer.outputColorSpace=THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

var scene=new THREE.Scene();
scene.background=new THREE.Color(0x080810);
scene.fog=new THREE.FogExp2(0x080810,.08); // Dense fog — 5-7m visibility

var camera=new THREE.PerspectiveCamera(68,window.innerWidth/window.innerHeight,.1,80);
camera.position.set(0,1.7,8);

var clock=new THREE.Clock();
var interactables=[];

// ════════════════════════════════════════════
//  MATERIALS — low-poly look, pixel noise
// ════════════════════════════════════════════
function noiseTex(w,h,base,range){
  var c=document.createElement('canvas');c.width=w;c.height=h;
  var x=c.getContext('2d');var d=x.createImageData(w,h);var p=d.data;
  var br=(base>>16)&255,bg=(base>>8)&255,bb=base&255;
  for(var i=0;i<p.length;i+=4){
    var n=(Math.random()-.5)*range|0;
    p[i]=Math.max(0,Math.min(255,br+n));
    p[i+1]=Math.max(0,Math.min(255,bg+n));
    p[i+2]=Math.max(0,Math.min(255,bb+n));
    p[i+3]=255;
  }
  x.putImageData(d,0,0);
  var t=new THREE.CanvasTexture(c);
  t.magFilter=THREE.NearestFilter;t.minFilter=THREE.NearestFilter;
  t.wrapS=t.wrapT=THREE.RepeatWrapping;
  return t;
}

var texStone=noiseTex(32,32,0x4a4a55,25);texStone.repeat.set(4,4);
var texWood=noiseTex(16,16,0x5a4030,20);texWood.repeat.set(3,3);
var texWoodDk=noiseTex(16,16,0x3a2820,18);texWoodDk.repeat.set(3,3);
var texMetal=noiseTex(8,8,0x556065,15);
var texWall=noiseTex(32,32,0x555566,22);texWall.repeat.set(6,8);
var texGround=noiseTex(64,64,0x3a3a30,20);texGround.repeat.set(8,8);

var mStone=new THREE.MeshLambertMaterial({map:texStone});
var mWall=new THREE.MeshLambertMaterial({map:texWall});
var mWood=new THREE.MeshLambertMaterial({map:texWood});
var mWoodDk=new THREE.MeshLambertMaterial({map:texWoodDk});
var mMetal=new THREE.MeshLambertMaterial({map:texMetal,color:0x889090});
var mGlass=new THREE.MeshLambertMaterial({color:0x88aacc,transparent:true,opacity:.25});
var mRust=new THREE.MeshLambertMaterial({color:0x7b4010,map:noiseTex(8,8,0x7b4010,30)});
var mGround=new THREE.MeshLambertMaterial({map:texGround});
var mEmit=new THREE.MeshBasicMaterial({color:0xffdd88});

// ════════════════════════════════════════════
//  BUILD: ISLAND
// ════════════════════════════════════════════
function buildIsland(){
  var g=new THREE.Group();
  // Rocky base
  var geo=new THREE.CylinderGeometry(18,22,4,16,3);
  var pos=geo.attributes.position;
  for(var i=0;i<pos.count;i++){
    var x=pos.getX(i),y=pos.getY(i),z=pos.getZ(i);
    var d=Math.sqrt(x*x+z*z);
    var n=Math.sin(x*.5)*Math.cos(z*.7)*1.2+Math.sin(x*1.3+z*.9)*.4;
    pos.setY(i,y+(y>0?n*.4:n-d*.04));
    if(d>12){pos.setX(i,x+(Math.random()-.5)*1.5);pos.setZ(i,z+(Math.random()-.5)*1.5);}
  }
  geo.computeVertexNormals();
  var m=new THREE.Mesh(geo,new THREE.MeshLambertMaterial({map:noiseTex(32,32,0x333328,20)}));
  m.position.y=-2;m.receiveShadow=true;g.add(m);

  // Walkable ground
  var gnd=new THREE.Mesh(new THREE.CircleGeometry(15,16),mGround);
  gnd.rotation.x=-Math.PI/2;gnd.position.y=.01;gnd.receiveShadow=true;g.add(gnd);

  // Rocks
  for(var i=0;i<20;i++){
    var a=Math.random()*Math.PI*2,dd=5+Math.random()*9;
    var rk=new THREE.Mesh(new THREE.DodecahedronGeometry(.3+Math.random()*.7,0),
      new THREE.MeshLambertMaterial({color:new THREE.Color(.25+Math.random()*.05,.25+Math.random()*.05,.22+Math.random()*.05)}));
    rk.position.set(Math.cos(a)*dd,Math.random()*.15,Math.sin(a)*dd);
    rk.rotation.set(Math.random(),Math.random(),Math.random());
    rk.scale.y*=.4+Math.random()*.5;rk.castShadow=true;g.add(rk);
  }
  return g;
}

// ════════════════════════════════════════════
//  BUILD: LIGHTHOUSE (low-poly angular)
// ════════════════════════════════════════════
var FLOORS=4,BASE_R=3.5,TOP_R=2.5,FL_H=3.5;
function buildLighthouse(){
  var g=new THREE.Group();
  // Outer wall — 8-sided for angular low-poly look
  var wallG=new THREE.CylinderGeometry(TOP_R,BASE_R,FL_H*FLOORS,8,FLOORS,true);
  var wall=new THREE.Mesh(wallG,mWall);
  wall.position.y=FL_H*FLOORS/2;wall.castShadow=true;wall.receiveShadow=true;g.add(wall);

  // Inner wall (backside)
  var inG=new THREE.CylinderGeometry(TOP_R-.45,BASE_R-.45,FL_H*FLOORS,8,FLOORS,true);
  var inW=new THREE.Mesh(inG,new THREE.MeshLambertMaterial({map:noiseTex(32,32,0x444440,18),side:THREE.BackSide}));
  inW.position.y=FL_H*FLOORS/2;g.add(inW);

  // Floors + ceilings
  for(var f=0;f<=FLOORS;f++){
    var y=f*FL_H,r=THREE.MathUtils.lerp(BASE_R,TOP_R,f/FLOORS)-.45;
    var fl=new THREE.Mesh(new THREE.CircleGeometry(r,8),mWood);
    fl.rotation.x=-Math.PI/2;fl.position.y=y+.02;fl.receiveShadow=true;g.add(fl);
    if(f>0){var cl=new THREE.Mesh(new THREE.CircleGeometry(r,8),mWoodDk);cl.rotation.x=Math.PI/2;cl.position.y=y-.02;g.add(cl);}

    // Stair hole — cut is visual only (opening in floor)
    if(f>0&&f<FLOORS){
      var hole=new THREE.Mesh(new THREE.CircleGeometry(.6,6),new THREE.MeshBasicMaterial({color:0x111111}));
      hole.rotation.x=-Math.PI/2;hole.position.set(Math.cos(f*1.5)*(r*.4),y+.03,Math.sin(f*1.5)*(r*.4));
      g.add(hole);
    }
  }

  // Spiral stairs — angular steps
  var stepsTotal=FLOORS*10;
  for(var s=0;s<stepsTotal;s++){
    var a=(s/stepsTotal)*Math.PI*2*FLOORS+Math.PI;
    var sy=(s/stepsTotal)*FL_H*FLOORS;
    var ff=sy/(FL_H*FLOORS);
    var rr=THREE.MathUtils.lerp(BASE_R,TOP_R,ff)-.5;
    var step=new THREE.Mesh(new THREE.BoxGeometry(1.1,.08,.3),mWood);
    step.position.set(Math.cos(a)*(rr*.55),sy+.04,Math.sin(a)*(rr*.55));
    step.rotation.y=-a+Math.PI/2;step.castShadow=true;g.add(step);
  }
  // Central pole
  var pole=new THREE.Mesh(new THREE.CylinderGeometry(.06,.06,FL_H*FLOORS,6),mMetal);
  pole.position.y=FL_H*FLOORS/2;g.add(pole);

  // Lamp room — glass (8-sided angular)
  var lrY=FL_H*FLOORS;
  var lr=new THREE.Mesh(new THREE.CylinderGeometry(TOP_R+.2,TOP_R,2.8,8,1,true),mGlass);
  lr.position.y=lrY+1.4;g.add(lr);

  // Lamp room floor
  var lf=new THREE.Mesh(new THREE.CircleGeometry(TOP_R,8),mMetal);
  lf.rotation.x=-Math.PI/2;lf.position.y=lrY+.02;g.add(lf);

  // Roof dome
  var roof=new THREE.Mesh(new THREE.ConeGeometry(TOP_R+.2,1.5,8),mMetal);
  roof.position.y=lrY+3.5;roof.castShadow=true;g.add(roof);

  // Lamp bulb (hidden until activated)
  var bulb=new THREE.Mesh(new THREE.SphereGeometry(.35,6,6),mEmit);
  bulb.position.y=lrY+1.5;bulb.visible=false;bulb.name='lamp';g.add(bulb);

  // Balcony ring
  var bal=new THREE.Mesh(new THREE.TorusGeometry(TOP_R+.5,.04,4,8),mMetal);
  bal.position.y=lrY;bal.rotation.x=Math.PI/2;g.add(bal);
  for(var i=0;i<8;i++){var aa=i/8*Math.PI*2;
    var p2=new THREE.Mesh(new THREE.CylinderGeometry(.025,.025,.9,4),mMetal);
    p2.position.set(Math.cos(aa)*(TOP_R+.5),lrY+.45,Math.sin(aa)*(TOP_R+.5));g.add(p2);}

  // Door
  var door=new THREE.Mesh(new THREE.BoxGeometry(1.1,2.1,.12),new THREE.MeshLambertMaterial({map:noiseTex(8,16,0x3a2a1a,22)}));
  door.position.set(0,1.05,BASE_R-.04);door.castShadow=true;door.name='door';g.add(door);
  var frame=new THREE.Mesh(new THREE.BoxGeometry(1.3,2.3,.18),mStone);
  frame.position.set(0,1.15,BASE_R-.08);g.add(frame);

  return g;
}

// ════════════════════════════════════════════
//  BUILD: INTERIOR OBJECTS
// ════════════════════════════════════════════
var intLights=[];
function buildInteriors(){
  var g=new THREE.Group();
  // Floor 0 — office
  (function(){
    var r=BASE_R-.5;
    var desk=new THREE.Mesh(new THREE.BoxGeometry(1.4,.7,.6),mWood);
    desk.position.set(-r*.4,.35,-r*.3);desk.castShadow=true;g.add(desk);

    // Oil lamp on desk
    var ol=new THREE.Mesh(new THREE.CylinderGeometry(.07,.1,.22,6),mMetal);
    ol.position.set(-r*.4,.85,-r*.3);g.add(ol);
    interactables.push({mesh:ol,prompt:'[E] Зажечь лампу',act:'lamp',used:false});

    // Chair
    var ch=new THREE.Mesh(new THREE.BoxGeometry(.45,.04,.45),mWood);
    ch.position.set(-r*.4,.42,.1);g.add(ch);
    var chB=new THREE.Mesh(new THREE.BoxGeometry(.45,.5,.04),mWood);
    chB.position.set(-r*.4,.65,.32);g.add(chB);

    // Radio
    var rd=new THREE.Mesh(new THREE.BoxGeometry(.28,.18,.14),new THREE.MeshLambertMaterial({color:0x222222}));
    rd.position.set(-r*.15,.82,-r*.3);rd.name='radio';g.add(rd);
    interactables.push({mesh:rd,prompt:'[E] Проверить рацию',act:'radio',used:false});

    // Shelves with bottles
    for(var i=0;i<3;i++){
      var sh=new THREE.Mesh(new THREE.BoxGeometry(1,.04,.25),mWoodDk);
      sh.position.set(r*.35,.9+i*.6,-r*.5);g.add(sh);
      // Bottles on shelves
      for(var j=0;j<3;j++){
        var bt=new THREE.Mesh(new THREE.CylinderGeometry(.03,.04,.15,5),
          new THREE.MeshLambertMaterial({color:Math.random()>.5?0x225533:0x443322}));
        bt.position.set(r*.35-.3+j*.25,.97+i*.6,-r*.5);g.add(bt);
      }
    }

    // Window (simple bright patch on wall)
    var win=new THREE.Mesh(new THREE.PlaneGeometry(.6,.8),new THREE.MeshBasicMaterial({color:0x334455,transparent:true,opacity:.3}));
    win.position.set(r*.7,1.8,-r*.6);win.rotation.y=-.3;g.add(win);
  })();

  // Floor 1 — bedroom
  (function(){
    var r=THREE.MathUtils.lerp(BASE_R,TOP_R,.25)-.5;
    var y=FL_H;
    var bed=new THREE.Mesh(new THREE.BoxGeometry(1.6,.35,.9),new THREE.MeshLambertMaterial({map:noiseTex(16,8,0x445566,15)}));
    bed.position.set(r*.2,y+.18,-r*.3);bed.castShadow=true;g.add(bed);

    var pillow=new THREE.Mesh(new THREE.BoxGeometry(.35,.1,.25),new THREE.MeshLambertMaterial({color:0x667788}));

var creature,creatureGeo,creatureVisible=false,creatureAlpha=0;
function buildCreature(){
  // Tall, thin, angular black silhouette
  var g=new THREE.Group();

  // Body — stretched box
  var bodyG=new THREE.BoxGeometry(.3,3,.15,1,4,1);
  var bodyM=new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:0});
  var body=new THREE.Mesh(bodyG,bodyM);
  body.position.y=1.5;
  g.add(body);

  // Head — angular
  var headG=new THREE.TetrahedronGeometry(.2,0);
  var head=new THREE.Mesh(headG,bodyM.clone());
  head.position.y=3.1;head.rotation.z=Math.PI/4;
  g.add(head);

  // Arms — thin stretched
  for(var side=-1;side<=1;side+=2){
    var armG=new THREE.BoxGeometry(.06,1.8,.04,1,3,1);
    var arm=new THREE.Mesh(armG,bodyM.clone());
    arm.position.set(side*.25,1.8,0);arm.rotation.z=side*.15;
    g.add(arm);
  }

  // Store original positions for vertex jitter
  g.traverse(function(ch){
    if(ch.isMesh){
      ch.geometry.userData.origPos=ch.geometry.attributes.position.array.slice();
    }
  });

  g.position.set(0,0,-20);g.visible=false;
  creature=g;
  scene.add(g);
}

function updateCreature(dt){
  if(!creature)return;
  // Show creature when sanity < 35 and it's night
  var shouldShow=S.sanity<35&&S.night;
  if(shouldShow&&!creatureVisible){
    creatureVisible=true;creature.visible=true;
    // Position behind player or in darkness
    var a=S.yaw+Math.PI+((Math.random()-.5)*.8);
    var d=6+Math.random()*4;
    creature.position.set(camera.position.x+Math.cos(a)*d,0,camera.position.z+Math.sin(a)*d);
    creature.lookAt(camera.position.x,1.7,camera.position.z);
  }
  if(!shouldShow&&creatureVisible){creatureVisible=false;creatureAlpha=0;creature.visible=false;}
  if(!creatureVisible)return;

  // Fade in
  creatureAlpha=Math.min(1,creatureAlpha+dt*.5);

  // Face player
  creature.lookAt(camera.position.x,0,camera.position.z);

  // Check if player is looking at creature
  var toC=new THREE.Vector3().subVectors(creature.position,camera.position).normalize();
  var camDir=new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
  var dot=camDir.dot(toC);
  var looking=dot>.85;

  // Vertex jitter when looked at!
  creature.traverse(function(ch){
    if(!ch.isMesh)return;
    var pos=ch.geometry.attributes.position;
    var orig=ch.geometry.userData.origPos;
    if(!orig)return;
    var jitter=looking?.08:.01;
    for(var i=0;i<pos.count;i++){
      pos.array[i*3]=orig[i*3]+(Math.random()-.5)*jitter;
      pos.array[i*3+1]=orig[i*3+1]+(Math.random()-.5)*jitter;
      pos.array[i*3+2]=orig[i*3+2]+(Math.random()-.5)*jitter;
    }
    pos.needsUpdate=true;
    ch.material.opacity=creatureAlpha*(looking?.85:.6);
  });

  // Drain sanity faster when looking
  if(looking)S.sanity=Math.max(0,S.sanity-dt*8);

  // Teleport away if player gets too close
  var dist=camera.position.distanceTo(creature.position);
  if(dist<3){
    creatureVisible=false;creature.visible=false;creatureAlpha=0;
    S.sanity=Math.max(0,S.sanity-10);
    if(AU.ctx)auPlay(genWhisper(),'hor',false,.6);
    // Flash
    document.getElementById('blink').style.opacity=1;
    setTimeout(function(){document.getElementById('blink').style.opacity=0;},120);
  }
}

function updatePlayer(dt){
  if(!S.locked||S.paused)return;
  camera.quaternion.setFromEuler(new THREE.Euler(S.pitch,S.yaw,0,'YXZ'));

  var spd=S.sprinting?S.sprint:S.speed;
  var fwd=new THREE.Vector3(0,0,-1).applyQuaternion(new THREE.Quaternion().setFromEuler(new THREE.Euler(0,S.yaw,0)));
  var rt=new THREE.Vector3(1,0,0).applyQuaternion(new THREE.Quaternion().setFromEuler(new THREE.Euler(0,S.yaw,0)));
  var mv=new THREE.Vector3();
  if(S.keys.KeyW)mv.add(fwd);if(S.keys.KeyS)mv.sub(fwd);
  if(S.keys.KeyD)mv.add(rt);if(S.keys.KeyA)mv.sub(rt);

  if(mv.length()>.01){
    mv.normalize().multiplyScalar(spd*dt);
    var np=camera.position.clone().add(mv);
    var dist=Math.sqrt(np.x*np.x+np.z*np.z);
    // Island boundary
    if(dist<14.5){
      // Lighthouse wall collision
      var hf=Math.max(0,Math.min(1,(camera.position.y-1.7)/(FL_H*FLOORS)));
      var wr=THREE.MathUtils.lerp(BASE_R,TOP_R,hf);
      if(dist>wr+.3||dist<wr-.5){
        camera.position.add(mv);
      }
    }
    S.bobPh+=dt*(S.sprinting?11:7.5);
  }

  // Head bob + breathing
  var bobAmt=mv.length()>.01?.025:0;
  var bob=Math.sin(S.bobPh)*bobAmt;
  S.breath+=((S.sprinting?.012:.004)+(1-S.sanity/100)*.008-S.breath)*dt*2;
  camera.position.y=1.7;
  camera.rotation.z=bob*.25+Math.sin(performance.now()*.003)*S.breath*.3;

  // Flashlight
  if(S.flashOn){
    flashlight.position.copy(camera.position);flashlight.position.y-=.15;
    var dir=new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
    flashlight.target.position.copy(camera.position).add(dir.multiplyScalar(10));
    flashlight.target.updateMatrixWorld();
    S.battery-=dt*1.2;
    if(S.battery<=0){S.flashOn=false;flashlight.visible=false;S.battery=0;showSub('Батарейки сели...',2000);}
    if(S.battery<20)flashlight.intensity=2+Math.random()*(Math.random()<.08?-1.5:.4);
  }

  // Check interactables
  var camDir2=new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
  S.nearItem=null;
  var pr=document.getElementById('prompt');
  for(var i=0;i<interactables.length;i++){
    var it=interactables[i];
    var ip=new THREE.Vector3();it.mesh.getWorldPosition(ip);
    var d=camera.position.distanceTo(ip);
    if(d<2.8){
      var toIt=ip.clone().sub(camera.position).normalize();
      if(camDir2.dot(toIt)>.65){
        S.nearItem=it;
        pr.textContent=(it.used&&it.act!=='radio')?'':it.prompt;
        pr.classList.add('on');break;
      }
    }
  }
  if(!S.nearItem)pr.classList.remove('on');
}

function updateTime(dt){
  S.gameTime+=S.timeSpeed*dt;if(S.gameTime>24)S.gameTime-=24;
  var h=S.gameTime;S.night=h>=20||h<6;

  var sunI,moonI,ambI,fogD;
  if(h>=6&&h<18){
    var dp=(h-6)/12,sh=Math.sin(dp*Math.PI);
    sunI=sh*.6;moonI=0;ambI=.18+sh*.25;fogD=.04+(1-sh)*.03;
    scene.background.setHex(sh>.5?0x556677:0x334455);
    scene.fog.color.copy(scene.background);
  }else if(h>=18&&h<20){
    var t=(h-18)/2;
    sunI=(1-t)*.4;moonI=t*.25;ambI=.25-t*.18;fogD=.05+t*.03;
    scene.background.set(new THREE.Color(0x884422).lerp(new THREE.Color(0x0a0a12),t));
    scene.fog.color.copy(scene.background);
  }else{
    sunI=0;moonI=.2;ambI=.05;fogD=.08;
    scene.background.setHex(0x050508);scene.fog.color.setHex(0x050508);
  }
  sunLight.intensity=sunI;moonLight.intensity=moonI;ambLight.intensity=ambI;scene.fog.density=fogD;

  // Lighthouse beam rotation
  if(S.lighthouseOn){
    var ba=performance.now()*.0004;
    lhBeam.target.position.set(Math.cos(ba)*40,8,Math.sin(ba)*40);
    lhBeam.target.updateMatrixWorld();
  }
}

function updateSanity(dt){
  var dark=!S.flashOn&&S.night;
  var nearL=false;
  for(var i=0;i<intLights.length;i++){if(camera.position.distanceTo(intLights[i].position)<4.5){nearL=true;break;}}
  if(dark&&!nearL)S.sanity-=dt*1.8;
  else if(nearL)S.sanity+=dt*.8;
  S.sanity=Math.max(0,Math.min(100,S.sanity));

  // UI
  var sb=document.getElementById('sbar'),sf=document.getElementById('sfill'),sl=document.getElementById('slbl');
  if(S.sanity<80){sb.classList.add('on');sl.classList.add('on');}else{sb.classList.remove('on');sl.classList.remove('on');}
  sf.style.width=S.sanity+'%';

  // Low sanity whispers + blinks
  if(S.sanity<30){
    S.whisperT-=dt;
    if(S.whisperT<=0){
      S.whisperT=6+Math.random()*12;
      document.getElementById('blink').style.opacity=1;
      setTimeout(function(){document.getElementById('blink').style.opacity=0;},70+Math.random()*100);
      if(AU.ctx)auPlay(genWhisper(),'hor',false,.25+Math.random()*.25);
    }
  }
  // Heartbeat
  if(S.sanity<25){
    S.scareT-=dt;
    if(S.scareT<=0){
      S.scareT=1.1-(1-S.sanity/25)*.35;
      if(AU.ctx)auPlay(genHeart(),'hor',false,.35+(1-S.sanity/25)*.35);
    }
  }

  // FOV distortion at low sanity
  camera.fov=68+(1-S.sanity/100)*8;camera.updateProjectionMatrix();
}

function updateNightEvents(dt){
  if(!S.night)return;
  if(!S.doorEvent&&S.gameTime>21&&S.gameTime<22){
    S.doorEvent=true;
    showSub('Кто-то... скребётся в дверь?',4000);
    if(AU.ctx)auPlay(genScratch(),'hor',false,.65);
    S.sanity=Math.max(0,S.sanity-15);
    setTimeout(function(){showSub('Скрежет прекратился. Тишина давит.',4000);},5000);
  }
  if(!S.firstScare&&S.gameTime>23){
    S.firstScare=true;
    setTimeout(function(){
      ambLight.intensity=3.5;
      setTimeout(function(){ambLight.intensity=.05;showSub('Что это было?!',3000);S.sanity=Math.max(0,S.sanity-20);
        if(AU.ctx)auPlay(genThunder(),'hor',false,.75);},120);
    },1500);
  }
}

function updateSea(dt){
  var m=scene.getObjectByName('sea');if(!m)return;
  var pos=m.geometry.attributes.position;var t=performance.now()*.001;
  for(var i=0;i<pos.count;i++){
    var x=pos.getX(i),z=pos.getZ(i);
    pos.setY(i,Math.sin(x*.04+t*.7)*Math.cos(z*.04+t*.5)*.4+Math.sin(x*.08+t*1.1)*.15);
  }
  pos.needsUpdate=true;m.geometry.computeVertexNormals();
}

function updateRain(dt){
  var pos=rain.geometry.attributes.position;
  for(var i=0;i<RAIN_N;i++){
    pos.array[i*3+1]-=13*dt;
    if(pos.array[i*3+1]<-2){
      pos.array[i*3+1]=20+Math.random()*5;
      pos.array[i*3]=camera.position.x+(Math.random()-.5)*50;
      pos.array[i*3+2]=camera.position.z+(Math.random()-.5)*50;
    }
  }
  pos.needsUpdate=true;rainMat.opacity=S.night?.25:.12;
}

function animate(){
  requestAnimationFrame(animate);
  var dt=Math.min(clock.getDelta(),.1);
  if(S.started&&!S.paused){
    updatePlayer(dt);updateTime(dt);updateSanity(dt);
    updateNightEvents(dt);updateSea(dt);updateRain(dt);
    updateCreature(dt);
  }
  renderer.render(scene,camera);
}

window.addEventListener('resize',function(){
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

animate();
</script>
</body>
</html>

<!DOCTYPE html>
<!-- v4 -->
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Эхо Затухающих Маяков</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:Georgia,serif;cursor:none;-webkit-user-select:none;user-select:none}
canvas#game{display:block;position:fixed;inset:0;z-index:1}

/* CRT overlay */
#crt{position:fixed;inset:0;pointer-events:none;z-index:200}
#crt::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.12) 0px,transparent 1px,transparent 2px);
  pointer-events:none}
#crt::after{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.6) 100%);
  pointer-events:none}

/* Grain */
#grain{position:fixed;inset:0;pointer-events:none;z-index:199;opacity:.06;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:128px 128px;animation:grainShift .1s steps(3) infinite}
@keyframes grainShift{0%{transform:translate(0,0)}33%{transform:translate(-2px,1px)}66%{transform:translate(1px,-1px)}100%{transform:translate(0,0)}}

/* Loading */
#loading{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity 1.5s}
#loading.fade{opacity:0;pointer-events:none}
#loading h1{color:#c4a35a;font-size:2.4em;letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px;text-shadow:0 0 30px rgba(196,163,90,.3)}
#loading .sub{color:#667;font-size:.95em;font-style:italic;margin-bottom:36px}
#loading .bar{width:280px;height:2px;background:#1a1a1a;border-radius:2px}
#loading .fill{height:100%;background:#c4a35a;width:0%;border-radius:2px;transition:width .3s}
#loading .status{color:#444;font-size:.7em;margin-top:12px;letter-spacing:.1em}
#loading .err{color:#a33;font-size:.8em;margin-top:20px;max-width:400px;text-align:center;display:none}

/* Start */
#start{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:900;cursor:pointer}
#start h2{color:#c4a35a;font-size:1.6em;margin-bottom:12px;animation:pulse 2s ease-in-out infinite}
#start p{color:#556;font-size:.85em}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

/* HUD */
#hud{position:fixed;inset:0;pointer-events:none;z-index:100;display:none}
#cross{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;border:1px solid rgba(200,200,200,.35);border-radius:50%}
#sbar{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);width:180px;height:2px;background:rgba(20,20,30,.6);border-radius:2px;opacity:0;transition:opacity .5s}
#sbar.on{opacity:1}
#sfill{height:100%;background:linear-gradient(90deg,#a33,#c4a35a);width:100%;border-radius:2px;transition:width .5s}
#slbl{position:absolute;bottom:35px;left:50%;transform:translateX(-50%);color:rgba(150,130,100,.45);font-size:.6em;letter-spacing:.2em;text-transform:uppercase;opacity:0;transition:opacity .5s}
#slbl.on{opacity:1}
#prompt{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);color:rgba(196,163,90,.8);font-size:.8em;letter-spacing:.1em;opacity:0;transition:opacity .3s;text-shadow:0 0 8px rgba(0,0,0,.9)}
#prompt.on{opacity:1}
#sub{position:absolute;bottom:110px;left:50%;transform:translateX(-50%);color:rgba(200,190,170,.85);font-size:.95em;max-width:550px;text-align:center;font-style:italic;opacity:0;transition:opacity .8s;text-shadow:0 0 15px rgba(0,0,0,.9)}
#sub.on{opacity:1}
#chap{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#c4a35a;font-size:2em;letter-spacing:.2em;text-transform:uppercase;opacity:0;z-index:250;pointer-events:none;text-shadow:0 0 40px rgba(196,163,90,.3);transition:opacity 2s}
#finfo{position:absolute;bottom:28px;right:28px;color:rgba(150,140,120,.35);font-size:.65em;letter-spacing:.1em}

/* Blink */
#blink{position:fixed;inset:0;background:#000;pointer-events:none;z-index:180;opacity:0;transition:opacity .08s}

/* Pause */
#pause{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:500}
#pause button{background:none;border:1px solid #444;color:#998;font-family:Georgia,serif;font-size:1.05em;padding:10px 36px;margin:7px;cursor:pointer;letter-spacing:.1em;transition:all .3s}
#pause button:hover{border-color:#c4a35a;color:#c4a35a}
</style>
</head>
<body>
<div id="crt"></div>
<div id="grain"></div>

<div id="loading">
  <h1>Эхо Затухающих Маяков</h1>
  <div class="sub">Глава I — Прибытие</div>
  <div class="bar"><div class="fill" id="lbar"></div></div>
  <div class="status" id="lstatus">загрузка...</div>
  <div class="err" id="lerr"></div>
</div>

<div id="start">
  <h2>Нажмите, чтобы начать</h2>
  <p>🎧 Наденьте наушники</p>
</div>

<div id="hud">
  <div id="cross"></div>
  <div id="slbl">Рассудок</div>
  <div id="sbar"><div id="sfill"></div></div>
  <div id="prompt"></div>
  <div id="sub"></div>
  <div id="finfo">[F] Фонарь</div>
</div>
<div id="chap"></div>
<div id="blink"></div>

  <button id="btnR">Продолжить</button>
  <button id="btnE">Выход</button>
</div>

<script>
// ═══════ ERROR HANDLER — show errors on screen ═══════
window.onerror = function(msg, src, line, col, err) {
  var el = document.getElementById('lerr');
  if (el) { el.style.display = 'block'; el.textContent = 'Error: ' + msg + ' (line ' + line + ')'; }
  console.error('GAME ERROR:', msg, src, line, col, err);
};
</script>

<script src="https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.min.js"
  onerror="document.getElementById('lerr').style.display='block';document.getElementById('lerr').textContent='Не удалось загрузить Three.js — проверь интернет';">
</script>

<script>
"use strict";

// ═══════════════════════════════════════════
//  CHECK THREE.JS LOADED
// ═══════════════════════════════════════════
if (typeof THREE === 'undefined') {
  document.getElementById('lerr').style.display = 'block';
  document.getElementById('lerr').textContent = 'Three.js не загрузился. Обнови страницу.';
  throw new Error('THREE not loaded');
}

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
var S = {
  loaded: false, started: false, paused: false, locked: false,
  sanity: 100, flashOn: false, battery: 100,
  lighthouseOn: false, doorEvent: false, firstScare: false,
  gameTime: 16, timeSpeed: 0.15, night: false,
  speed: 3.2, sprint: 5, sprinting: false, bobPh: 0, breath: 0,
  keys: {}, yaw: 0, pitch: 0,
  nearItem: null, scareT: 0, whisperT: 0
};

// ═══════════════════════════════════════════
//  AUDIO (procedural — no files needed)
// ═══════════════════════════════════════════
var AU = { ctx: null, g: {} };
function audioInit() {
  AU.ctx = new (window.AudioContext || window.webkitAudioContext)();
  AU.master = AU.ctx.createGain(); AU.master.gain.value = 0.65; AU.master.connect(AU.ctx.destination);
  var cats = ['amb', 'sfx', 'hor'];
  for (var i = 0; i < cats.length; i++) {
    AU.g[cats[i]] = AU.ctx.createGain(); AU.g[cats[i]].connect(AU.master);
  }
  AU.g.amb.gain.value = 0.4; AU.g.sfx.gain.value = 0.55; AU.g.hor.gain.value = 0.45;
}

function genBuf(dur, ch, fn) {
  var sr = AU.ctx.sampleRate, len = (sr * dur) | 0;
  var buf = AU.ctx.createBuffer(ch, len, sr);
  for (var c = 0; c < ch; c++) fn(buf.getChannelData(c), len, sr, c);
  return buf;
}

function genWind() {
  return genBuf(4, 2, function(d, n, sr, ch) {
    var v = 0;
    for (var i = 0; i < n; i++) {
      v += (Math.random() * 2 - 1 - v) * 0.003;
      d[i] = v * (Math.sin(i / sr * 0.7 + ch) * 0.5 + 0.5) * 3 * Math.sin(Math.PI * i / n);
    }
  });
}

function genRain() {
  return genBuf(3, 2, function(d, n) {
    for (var i = 0; i < n; i++) {
      var spike = Math.random() < 0.15 ? (Math.random() - 0.5) * 0.5 : 0;
      d[i] = spike + (Math.random() * 2 - 1) * 0.07;
    }
  });
}

function genWaves() {
  return genBuf(5, 2, function(d, n, sr, ch) {
    var v = 0;
    for (var i = 0; i < n; i++) {
      v += (Math.random() * 2 - 1 - v) * 0.002;
      d[i] = v * (Math.sin(i / sr * 0.4 + ch * 0.5) * 0.5 + 0.5) * 2 * 0.35;
    }
  });
}

function genCreak() {
  return genBuf(1.5, 1, function(d, n, sr) {
    for (var i = 0; i < n; i++) {
      var t = i / sr, f = 80 + Math.sin(t * 3) * 40;
      var e = Math.exp(-t * 2) * Math.sin(Math.PI * t / 1.5);
      d[i] = (Math.sin(t * f * 6.28) + (Math.random() - 0.5) * 0.3) * e * 0.25;
    }
  });
}

function genThunder() {
  return genBuf(3, 2, function(d, n, sr) {
    var v = 0;
    for (var i = 0; i < n; i++) {
      var t = i / sr;
      v += (Math.random() * 2 - 1 - v) * 0.01;
      var c = t < 0.1 ? Math.sin(t * 800) * (1 - t * 10) : 0;
      d[i] = (c * 0.7 + v * Math.exp(-t * 1.5) * 4) * 0.45;
    }
  });
}

function genScratch() {
  return genBuf(2, 1, function(d, n, sr) {
    for (var i = 0; i < n; i++) {
      var t = i / sr, b = Math.random() < 0.03 ? 1 : 0;
      var env = Math.sin(Math.PI * t / 2 * 3) * 0.4;
      d[i] = (Math.sin(t * (200 + Math.sin(t * 5) * 100)) * 0.08 + (Math.random() - 0.5) * b * 0.35) * env;
    }
  });
}

function genHeart() {
  return genBuf(1, 1, function(d, n, sr) {
    for (var i = 0; i < n; i++) {
      var t = i / sr;
      var b1 = Math.exp(-Math.pow((t - 0.1) * 20, 2)) * Math.sin(t * 60 * 6.28);
      var b2 = Math.exp(-Math.pow((t - 0.3) * 20, 2)) * Math.sin(t * 50 * 6.28);
      d[i] = (b1 + b2 * 0.7) * 0.35;
    }
  });
}

function genWhisper() {
  return genBuf(2, 2, function(d, n, sr, ch) {
    for (var i = 0; i < n; i++) {
      var t = i / sr, e = Math.sin(Math.PI * t / 2);
      d[i] = ((Math.random() - 0.5) * 0.12 + Math.sin(t * (300 + ch * 50) * 6.28) * 0.04) * e;
    }
  });
}

function auPlay(buf, cat, loop, vol) {
  var s = AU.ctx.createBufferSource(); s.buffer = buf; s.loop = !!loop;
  var g = AU.ctx.createGain(); g.gain.value = vol || 1;
  s.connect(g); g.connect(AU.g[cat || 'sfx']); s.start();
  return { s: s, g: g };
}

// ═══════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════
var subTO;
function showSub(t, dur) {
  var el = document.getElementById('sub');
  el.textContent = t; el.classList.add('on');
  clearTimeout(subTO);
  subTO = setTimeout(function() { el.classList.remove('on'); }, dur || 3000);
}

function showChap(t, dur) {
  var el = document.getElementById('chap');
  el.textContent = t; el.style.opacity = 1;
  setTimeout(function() { el.style.opacity = 0; }, dur || 4000);
}

// ═══════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════
var FLOORS = 4, BASE_R = 3.5, TOP_R = 2.5, FL_H = 3.5;

// ═══════════════════════════════════════════
//  DEFERRED INIT — runs AFTER loading bar starts
// ═══════════════════════════════════════════
var renderer, scene, camera, clock;
var flashlight, lhBeam, ambLight, sunLight, moonLight;
var interactables = [], intLights = [];
var creature, creatureVisible = false, creatureAlpha = 0;
var rain, rainMat;

function initGame() {
  // Renderer
  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game'), antialias: false, powerPreference: 'default' });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 0.7;
  renderer.outputColorSpace = THREE.SRGBColorSpace;

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x080810);
  scene.fog = new THREE.FogExp2(0x080810, 0.08);

  camera = new THREE.PerspectiveCamera(68, window.innerWidth / window.innerHeight, 0.1, 80);
  camera.position.set(0, 1.7, 8);

  clock = new THREE.Clock();

  return 'renderer';
}

// ═══════════════════════════════════════════
//  TEXTURE GENERATOR — pixel art noise
// ═══════════════════════════════════════════
function noiseTex(w, h, base, range) {
  var c = document.createElement('canvas'); c.width = w; c.height = h;
  var x = c.getContext('2d');
  var d = x.createImageData(w, h); var p = d.data;
  var br = (base >> 16) & 255, bg = (base >> 8) & 255, bb = base & 255;
  for (var i = 0; i < p.length; i += 4) {
    var n = ((Math.random() - 0.5) * range) | 0;
    p[i] = Math.max(0, Math.min(255, br + n));
    p[i + 1] = Math.max(0, Math.min(255, bg + n));
    p[i + 2] = Math.max(0, Math.min(255, bb + n));
    p[i + 3] = 255;
  }
  x.putImageData(d, 0, 0);
  var t = new THREE.CanvasTexture(c);
  t.magFilter = THREE.NearestFilter; t.minFilter = THREE.NearestFilter;
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  return t;
}

// Materials (created during init)
var mStone, mWall, mWood, mWoodDk, mMetal, mGlass, mRust, mGround, mEmit;

function initMaterials() {
  var texStone = noiseTex(32, 32, 0x4a4a55, 25); texStone.repeat.set(4, 4);
  var texWood = noiseTex(16, 16, 0x5a4030, 20); texWood.repeat.set(3, 3);
  var texWoodDk = noiseTex(16, 16, 0x3a2820, 18); texWoodDk.repeat.set(3, 3);
  var texMetal = noiseTex(8, 8, 0x556065, 15);
  var texWall = noiseTex(32, 32, 0x555566, 22); texWall.repeat.set(6, 8);
  var texGround = noiseTex(64, 64, 0x3a3a30, 20); texGround.repeat.set(8, 8);

  mStone = new THREE.MeshLambertMaterial({ map: texStone });
  mWall = new THREE.MeshLambertMaterial({ map: texWall });
  mWood = new THREE.MeshLambertMaterial({ map: texWood });
  mWoodDk = new THREE.MeshLambertMaterial({ map: texWoodDk });
  mMetal = new THREE.MeshLambertMaterial({ map: texMetal, color: 0x889090 });
  mGlass = new THREE.MeshLambertMaterial({ color: 0x88aacc, transparent: true, opacity: 0.25 });
  mRust = new THREE.MeshLambertMaterial({ color: 0x7b4010, map: noiseTex(8, 8, 0x7b4010, 30) });
  mGround = new THREE.MeshLambertMaterial({ map: texGround });
  mEmit = new THREE.MeshBasicMaterial({ color: 0xffdd88 });
  return 'materials';
}

// ═══════════════════════════════════════════
//  BUILD FUNCTIONS
// ═══════════════════════════════════════════
function buildIsland() {
  var g = new THREE.Group();
  var geo = new THREE.CylinderGeometry(18, 22, 4, 16, 3);
  var pos = geo.attributes.position;
  for (var i = 0; i < pos.count; i++) {
    var x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
    var d = Math.sqrt(x * x + z * z);
    var n = Math.sin(x * 0.5) * Math.cos(z * 0.7) * 1.2 + Math.sin(x * 1.3 + z * 0.9) * 0.4;
    if (y > 0) pos.setY(i, y + n * 0.4);
    else pos.setY(i, y + n - d * 0.04);
    if (d > 12) { pos.setX(i, x + (Math.random() - 0.5) * 1.5); pos.setZ(i, z + (Math.random() - 0.5) * 1.5); }
  }
  geo.computeVertexNormals();
  var m = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ map: noiseTex(32, 32, 0x333328, 20) }));
  m.position.y = -2; m.receiveShadow = true; g.add(m);

  var gnd = new THREE.Mesh(new THREE.CircleGeometry(15, 16), mGround);
  gnd.rotation.x = -Math.PI / 2; gnd.position.y = 0.01; gnd.receiveShadow = true; g.add(gnd);

  for (var i = 0; i < 20; i++) {
    var a = Math.random() * Math.PI * 2, dd = 5 + Math.random() * 9;
    var rk = new THREE.Mesh(new THREE.DodecahedronGeometry(0.3 + Math.random() * 0.7, 0),
      new THREE.MeshLambertMaterial({ color: new THREE.Color(0.25 + Math.random() * 0.05, 0.25 + Math.random() * 0.05, 0.22 + Math.random() * 0.05) }));
    rk.position.set(Math.cos(a) * dd, Math.random() * 0.15, Math.sin(a) * dd);
    rk.rotation.set(Math.random(), Math.random(), Math.random());
    rk.scale.y *= 0.4 + Math.random() * 0.5; rk.castShadow = true; g.add(rk);
  }
  scene.add(g);
  return 'island';
}

function buildLighthouse() {
  var g = new THREE.Group();
  // Outer wall — 8-sided angular
  var wallG = new THREE.CylinderGeometry(TOP_R, BASE_R, FL_H * FLOORS, 8, FLOORS, true);
  var wall = new THREE.Mesh(wallG, mWall);
  wall.position.y = FL_H * FLOORS / 2; wall.castShadow = true; wall.receiveShadow = true; g.add(wall);

  // Inner wall
  var inG = new THREE.CylinderGeometry(TOP_R - 0.45, BASE_R - 0.45, FL_H * FLOORS, 8, FLOORS, true);
  var inW = new THREE.Mesh(inG, new THREE.MeshLambertMaterial({ map: noiseTex(32, 32, 0x444440, 18), side: THREE.BackSide }));
  inW.position.y = FL_H * FLOORS / 2; g.add(inW);

  // Floors + ceilings
  for (var f = 0; f <= FLOORS; f++) {
    var y = f * FL_H;
    var r = THREE.MathUtils.lerp(BASE_R, TOP_R, f / FLOORS) - 0.45;
    var fl = new THREE.Mesh(new THREE.CircleGeometry(r, 8), mWood);
    fl.rotation.x = -Math.PI / 2; fl.position.y = y + 0.02; fl.receiveShadow = true; g.add(fl);
    if (f > 0) {
      var cl = new THREE.Mesh(new THREE.CircleGeometry(r, 8), mWoodDk);
      cl.rotation.x = Math.PI / 2; cl.position.y = y - 0.02; g.add(cl);
    }
  }

  // Spiral stairs
  var stepsTotal = FLOORS * 10;
  for (var s = 0; s < stepsTotal; s++) {
    var a = (s / stepsTotal) * Math.PI * 2 * FLOORS + Math.PI;
    var sy = (s / stepsTotal) * FL_H * FLOORS;
    var ff = sy / (FL_H * FLOORS);
    var rr = THREE.MathUtils.lerp(BASE_R, TOP_R, ff) - 0.5;
    var step = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.08, 0.3), mWood);
    step.position.set(Math.cos(a) * (rr * 0.55), sy + 0.04, Math.sin(a) * (rr * 0.55));
    step.rotation.y = -a + Math.PI / 2; step.castShadow = true; g.add(step);
  }
  var pole = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, FL_H * FLOORS, 6), mMetal);
  pole.position.y = FL_H * FLOORS / 2; g.add(pole);

  // Lamp room
  var lrY = FL_H * FLOORS;
  var lr = new THREE.Mesh(new THREE.CylinderGeometry(TOP_R + 0.2, TOP_R, 2.8, 8, 1, true), mGlass);
  lr.position.y = lrY + 1.4; g.add(lr);
  var lf = new THREE.Mesh(new THREE.CircleGeometry(TOP_R, 8), mMetal);
  lf.rotation.x = -Math.PI / 2; lf.position.y = lrY + 0.02; g.add(lf);

  // Roof
  var roof = new THREE.Mesh(new THREE.ConeGeometry(TOP_R + 0.2, 1.5, 8), mMetal);
  roof.position.y = lrY + 3.5; roof.castShadow = true; g.add(roof);

  // Lamp bulb
  var bulb = new THREE.Mesh(new THREE.SphereGeometry(0.35, 6, 6), mEmit);
  bulb.position.y = lrY + 1.5; bulb.visible = false; bulb.name = 'lamp'; g.add(bulb);

  // Balcony
  var bal = new THREE.Mesh(new THREE.TorusGeometry(TOP_R + 0.5, 0.04, 4, 8), mMetal);
  bal.position.y = lrY; bal.rotation.x = Math.PI / 2; g.add(bal);
  for (var i = 0; i < 8; i++) {
    var aa = i / 8 * Math.PI * 2;
    var p2 = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.9, 4), mMetal);
    p2.position.set(Math.cos(aa) * (TOP_R + 0.5), lrY + 0.45, Math.sin(aa) * (TOP_R + 0.5)); g.add(p2);
  }

  // Door
  var door = new THREE.Mesh(new THREE.BoxGeometry(1.1, 2.1, 0.12),
    new THREE.MeshLambertMaterial({ map: noiseTex(8, 16, 0x3a2a1a, 22) }));
  door.position.set(0, 1.05, BASE_R - 0.04); door.castShadow = true; door.name = 'door'; g.add(door);
  var frame = new THREE.Mesh(new THREE.BoxGeometry(1.3, 2.3, 0.18), mStone);
  frame.position.set(0, 1.15, BASE_R - 0.08); g.add(frame);

function buildCreature() {
  var g = new THREE.Group();
  var bodyMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0 });

  var body = new THREE.Mesh(new THREE.BoxGeometry(0.3, 3, 0.15, 1, 4, 1), bodyMat);
  body.position.y = 1.5; g.add(body);

  var head = new THREE.Mesh(new THREE.TetrahedronGeometry(0.2, 0), bodyMat.clone());
  head.position.y = 3.1; head.rotation.z = Math.PI / 4; g.add(head);

  for (var side = -1; side <= 1; side += 2) {
    var arm = new THREE.Mesh(new THREE.BoxGeometry(0.06, 1.8, 0.04, 1, 3, 1), bodyMat.clone());
    arm.position.set(side * 0.25, 1.8, 0); arm.rotation.z = side * 0.15; g.add(arm);
  }

  // Store original vertex positions for jitter
  g.traverse(function(ch) {
    if (ch.isMesh) {
      ch.geometry.userData.origPos = ch.geometry.attributes.position.array.slice();
    }
  });

  g.position.set(0, 0, -30); g.visible = false;
  creature = g;
  scene.add(g);
  return 'creature';
}

//  LOADING SYSTEM — runs FIRST, builds scene in steps
// ═══════════════════════════════════════════
var buildSteps = [
  { fn: initGame, label: 'движок...' },
  { fn: initMaterials, label: 'текстуры...' },
  { fn: buildIsland, label: 'остров...' },
  { fn: buildLighthouse, label: 'маяк...' },
  { fn: buildInteriors, label: 'интерьер...' },
  { fn: buildCreature, label: 'тени...' },
  { fn: buildSea, label: 'море...' },
  { fn: buildRain, label: 'дождь...' },
  { fn: buildLights, label: 'свет...' }
];

function runLoading() {
  var bar = document.getElementById('lbar');
  var stat = document.getElementById('lstatus');
  var errEl = document.getElementById('lerr');
  var step = 0;
  var total = buildSteps.length;

  function nextStep() {
    if (step >= total) {
      bar.style.width = '100%';
      stat.textContent = 'готово';
      setTimeout(function() {
        document.getElementById('loading').classList.add('fade');
        document.getElementById('start').style.display = 'flex';
        S.loaded = true;
      }, 500);
      return;
    }

    var current = buildSteps[step];
    stat.textContent = current.label;
    bar.style.width = ((step / total) * 100) + '%';

    // Run build step with error handling
    setTimeout(function() {
      try {
        var result = current.fn();
        step++;
        nextStep();
      } catch (e) {
        errEl.style.display = 'block';
        errEl.textContent = 'Ошибка (' + current.label + '): ' + e.message;
        console.error('Build error at step "' + current.label + '":', e);
      }
    }, 50); // Small delay so UI updates
  }

  nextStep();
}

// Start loading immediately!
runLoading();

document.addEventListener('mousemove', function(e) {
  if (!S.locked || S.paused) return;
  S.yaw -= e.movementX * 0.002;
  S.pitch -= e.movementY * 0.002;
  S.pitch = Math.max(-1.4, Math.min(1.4, S.pitch));
});

document.addEventListener('keydown', function(e) {
  S.keys[e.code] = true;
  if (e.code === 'KeyF' && S.started && !S.paused) toggleFlash();
  if (e.code === 'KeyE' && S.started && !S.paused) doInteract();
  if (e.code === 'Escape' && S.started) togglePause();
  if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') S.sprinting = true;
});

document.addEventListener('keyup', function(e) {
  S.keys[e.code] = false;
  if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') S.sprinting = false;
});

function toggleFlash() {
  S.flashOn = !S.flashOn;
  flashlight.visible = S.flashOn;
  if (S.flashOn) flashlight.intensity = 3;
}

function doInteract() {
  if (!S.nearItem) return;
  var it = S.nearItem;
  if (it.used && it.act !== 'radio') return;

  if (it.act === 'lighthouse') {
    S.lighthouseOn = true;
    var lmp = scene.getObjectByName('lamp');
    if (lmp) lmp.visible = true;
    lhBeam.visible = true; lhBeam.intensity = 6;
    showSub('Маяк запущен. Свет пронзает туман...', 4000);
    S.gameTime = Math.max(S.gameTime, 20.5);
    it.used = true;
  } else if (it.act === 'lamp') {
    var p = new THREE.Vector3(); it.mesh.getWorldPosition(p);
    var lt = new THREE.PointLight(0xffaa44, 1.2, 5);
    lt.position.copy(p); lt.position.y += 0.25; scene.add(lt); intLights.push(lt);
    S.sanity = Math.min(100, S.sanity + 5);
    showSub('Тёплый свет лампы успокаивает...', 3000);
    it.used = true;
  } else if (it.act === 'radio') {
    if (!it.used) {
      showSub('Рация трещит... Только статические помехи.', 3000); it.used = true;
    } else if (S.night) {
      showSub('Сквозь помехи... голос? «...папа... помоги...»', 4000);
      S.sanity = Math.max(0, S.sanity - 10);
      if (AU.ctx) auPlay(genWhisper(), 'hor', false, 0.7);
    } else {
      showSub('Рация молчит. Нет сигнала.', 2000);
    }
  } else if (it.act === 'photo') {
    showSub('Фотография девочки. На обороте: «Лили, 5 лет. Папа, я тебя жду.»', 5000);
    S.sanity = Math.max(0, S.sanity - 3); it.used = true;
  }
}

}

//  UPDATE FUNCTIONS
// ═══════════════════════════════════════════
function updatePlayer(dt) {
  if (!S.locked || S.paused) return;
  camera.quaternion.setFromEuler(new THREE.Euler(S.pitch, S.yaw, 0, 'YXZ'));

  var spd = S.sprinting ? S.sprint : S.speed;
  var yawQ = new THREE.Quaternion().setFromEuler(new THREE.Euler(0, S.yaw, 0));
  var fwd = new THREE.Vector3(0, 0, -1).applyQuaternion(yawQ);
  var rt = new THREE.Vector3(1, 0, 0).applyQuaternion(yawQ);
  var mv = new THREE.Vector3();
  if (S.keys.KeyW) mv.add(fwd);
  if (S.keys.KeyS) mv.sub(fwd);
  if (S.keys.KeyD) mv.add(rt);
  if (S.keys.KeyA) mv.sub(rt);

  if (mv.lengthSq() > 0.001) {
    mv.normalize().multiplyScalar(spd * dt);
    var np = camera.position.clone().add(mv);
    var dist = Math.sqrt(np.x * np.x + np.z * np.z);
    if (dist < 14.5) {
      var hf = Math.max(0, Math.min(1, (camera.position.y - 1.7) / (FL_H * FLOORS)));
      var wr = THREE.MathUtils.lerp(BASE_R, TOP_R, hf);
      if (dist > wr + 0.3 || dist < wr - 0.5) {
        camera.position.add(mv);
      }
    }
    S.bobPh += dt * (S.sprinting ? 11 : 7.5);
  }

  var bobAmt = mv.lengthSq() > 0.001 ? 0.025 : 0;
  var bob = Math.sin(S.bobPh) * bobAmt;
  var breathTarget = (S.sprinting ? 0.012 : 0.004) + (1 - S.sanity / 100) * 0.008;
  S.breath += (breathTarget - S.breath) * dt * 2;
  camera.position.y = 1.7;
  camera.rotation.z = bob * 0.25 + Math.sin(performance.now() * 0.003) * S.breath * 0.3;

  // Flashlight
  if (S.flashOn) {
    flashlight.position.copy(camera.position); flashlight.position.y -= 0.15;
    var dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
    flashlight.target.position.copy(camera.position).add(dir.multiplyScalar(10));
    flashlight.target.updateMatrixWorld();
    S.battery -= dt * 1.2;
    if (S.battery <= 0) { S.flashOn = false; flashlight.visible = false; S.battery = 0; showSub('Батарейки сели...', 2000); }
    if (S.battery < 20) {
      var flicker = Math.random() < 0.08 ? -1.5 : 0.4;
      flashlight.intensity = 2 + Math.random() * flicker;
    }
  }

  // Interactables
  var camDir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
  S.nearItem = null;
  var pr = document.getElementById('prompt');
  for (var i = 0; i < interactables.length; i++) {
    var it = interactables[i];
    var ip = new THREE.Vector3(); it.mesh.getWorldPosition(ip);
    var d = camera.position.distanceTo(ip);
    if (d < 2.8) {
      var toIt = ip.clone().sub(camera.position).normalize();
      if (camDir.dot(toIt) > 0.65) {
        S.nearItem = it;
        var txt = (it.used && it.act !== 'radio') ? '' : it.prompt;
        pr.textContent = txt;
        pr.classList.add('on');
        break;
      }
    }
  }
  if (!S.nearItem) pr.classList.remove('on');
}

function updateTime(dt) {
  S.gameTime += S.timeSpeed * dt;
  if (S.gameTime > 24) S.gameTime -= 24;
  var h = S.gameTime;
  S.night = h >= 20 || h < 6;

  var sunI, moonI, ambI, fogD;
  if (h >= 6 && h < 18) {
    var dp = (h - 6) / 12, sh = Math.sin(dp * Math.PI);
    sunI = sh * 0.6; moonI = 0; ambI = 0.18 + sh * 0.25; fogD = 0.04 + (1 - sh) * 0.03;
    var skyHex = sh > 0.5 ? 0x556677 : 0x334455;
    scene.background.setHex(skyHex); scene.fog.color.setHex(skyHex);
  } else if (h >= 18 && h < 20) {
    var t = (h - 18) / 2;
    sunI = (1 - t) * 0.4; moonI = t * 0.25; ambI = 0.25 - t * 0.18; fogD = 0.05 + t * 0.03;
    scene.background.set(new THREE.Color(0x884422).lerp(new THREE.Color(0x0a0a12), t));
    scene.fog.color.copy(scene.background);
  } else {
    sunI = 0; moonI = 0.2; ambI = 0.05; fogD = 0.08;
    scene.background.setHex(0x050508); scene.fog.color.setHex(0x050508);
  }
  sunLight.intensity = sunI; moonLight.intensity = moonI; ambLight.intensity = ambI; scene.fog.density = fogD;

  if (S.lighthouseOn) {
    var ba = performance.now() * 0.0004;
    lhBeam.target.position.set(Math.cos(ba) * 40, 8, Math.sin(ba) * 40);
    lhBeam.target.updateMatrixWorld();
  }
}

function updateSanity(dt) {
  var dark = !S.flashOn && S.night;
  var nearL = false;
  for (var i = 0; i < intLights.length; i++) {
    if (camera.position.distanceTo(intLights[i].position) < 4.5) { nearL = true; break; }
  }
  if (dark && !nearL) S.sanity -= dt * 1.8;
  else if (nearL) S.sanity += dt * 0.8;
  S.sanity = Math.max(0, Math.min(100, S.sanity));

  var sb = document.getElementById('sbar'), sf = document.getElementById('sfill'), sl = document.getElementById('slbl');
  if (S.sanity < 80) { sb.classList.add('on'); sl.classList.add('on'); }
  else { sb.classList.remove('on'); sl.classList.remove('on'); }
  sf.style.width = S.sanity + '%';

  // Whispers + blinks at low sanity
  if (S.sanity < 30) {
    S.whisperT -= dt;
    if (S.whisperT <= 0) {
      S.whisperT = 6 + Math.random() * 12;
      var bl = document.getElementById('blink');
      bl.style.opacity = 1;
      setTimeout(function() { bl.style.opacity = 0; }, 70 + Math.random() * 100);
      if (AU.ctx) auPlay(genWhisper(), 'hor', false, 0.25 + Math.random() * 0.25);
    }
  }

  // Heartbeat
  if (S.sanity < 25) {
    S.scareT -= dt;
    if (S.scareT <= 0) {
      S.scareT = 1.1 - (1 - S.sanity / 25) * 0.35;
      if (AU.ctx) auPlay(genHeart(), 'hor', false, 0.35 + (1 - S.sanity / 25) * 0.35);
    }
  }

  // FOV distortion
  camera.fov = 68 + (1 - S.sanity / 100) * 8;
  camera.updateProjectionMatrix();
}

function updateCreature(dt) {
  if (!creature) return;
  var shouldShow = S.sanity < 35 && S.night;

  if (shouldShow && !creatureVisible) {
    creatureVisible = true; creature.visible = true;
    var a = S.yaw + Math.PI + (Math.random() - 0.5) * 0.8;
    var d = 6 + Math.random() * 4;
    creature.position.set(camera.position.x + Math.cos(a) * d, 0, camera.position.z + Math.sin(a) * d);
    creature.lookAt(camera.position.x, 1.7, camera.position.z);
  }
  if (!shouldShow && creatureVisible) {
    creatureVisible = false; creatureAlpha = 0; creature.visible = false;
  }
  if (!creatureVisible) return;

  creatureAlpha = Math.min(1, creatureAlpha + dt * 0.5);
  creature.lookAt(camera.position.x, 0, camera.position.z);

  var toC = new THREE.Vector3().subVectors(creature.position, camera.position).normalize();
  var camDir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
  var dot = camDir.dot(toC);
  var looking = dot > 0.85;

  // Vertex jitter!
  creature.traverse(function(ch) {
    if (!ch.isMesh) return;
    var pos = ch.geometry.attributes.position;
    var orig = ch.geometry.userData.origPos;
    if (!orig) return;
    var jitter = looking ? 0.08 : 0.01;
    for (var i = 0; i < pos.count; i++) {
      pos.array[i * 3] = orig[i * 3] + (Math.random() - 0.5) * jitter;
      pos.array[i * 3 + 1] = orig[i * 3 + 1] + (Math.random() - 0.5) * jitter;
      pos.array[i * 3 + 2] = orig[i * 3 + 2] + (Math.random() - 0.5) * jitter;
    }
    pos.needsUpdate = true;
    ch.material.opacity = creatureAlpha * (looking ? 0.85 : 0.6);
  });

  if (looking) S.sanity = Math.max(0, S.sanity - dt * 8);

  // Teleport away if too close
  var dist = camera.position.distanceTo(creature.position);
  if (dist < 3) {
    creatureVisible = false; creature.visible = false; creatureAlpha = 0;
    S.sanity = Math.max(0, S.sanity - 10);
    if (AU.ctx) auPlay(genWhisper(), 'hor', false, 0.6);
    var bl = document.getElementById('blink');
    bl.style.opacity = 1;
    setTimeout(function() { bl.style.opacity = 0; }, 120);
  }
}

function updateNightEvents(dt) {
  if (!S.night) return;
  if (!S.doorEvent && S.gameTime > 21 && S.gameTime < 22) {
    S.doorEvent = true;
    showSub('Кто-то... скребётся в дверь?', 4000);
    if (AU.ctx) auPlay(genScratch(), 'hor', false, 0.65);
    S.sanity = Math.max(0, S.sanity - 15);
    setTimeout(function() { showSub('Скрежет прекратился. Тишина давит.', 4000); }, 5000);
  }
  if (!S.firstScare && S.gameTime > 23) {
    S.firstScare = true;
    setTimeout(function() {
      if (ambLight) ambLight.intensity = 3.5;
      setTimeout(function() {
        if (ambLight) ambLight.intensity = 0.05;
        showSub('Что это было?!', 3000);
        S.sanity = Math.max(0, S.sanity - 20);
        if (AU.ctx) auPlay(genThunder(), 'hor', false, 0.75);
      }, 120);
    }, 1500);
  }
}

function updateSea(dt) {
  var m = scene.getObjectByName('sea');
  if (!m) return;
  var pos = m.geometry.attributes.position;
  var t = performance.now() * 0.001;
  for (var i = 0; i < pos.count; i++) {
    var x = pos.getX(i), z = pos.getZ(i);
    pos.setY(i, Math.sin(x * 0.04 + t * 0.7) * Math.cos(z * 0.04 + t * 0.5) * 0.4 + Math.sin(x * 0.08 + t * 1.1) * 0.15);
  }
  pos.needsUpdate = true; m.geometry.computeVertexNormals();
}

function updateRain(dt) {
  if (!rain) return;
  var pos = rain.geometry.attributes.position;
  var count = pos.count;
  for (var i = 0; i < count; i++) {
    pos.array[i * 3 + 1] -= 13 * dt;
    if (pos.array[i * 3 + 1] < -2) {
      pos.array[i * 3 + 1] = 20 + Math.random() * 5;
      pos.array[i * 3] = camera.position.x + (Math.random() - 0.5) * 50;
      pos.array[i * 3 + 2] = camera.position.z + (Math.random() - 0.5) * 50;
    }
  }
  pos.needsUpdate = true;
  rainMat.opacity = S.night ? 0.25 : 0.12;
}

// ═══════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════
function animate() {
  requestAnimationFrame(animate);
  if (!renderer) return;
  var dt = Math.min(clock.getDelta(), 0.1);
  if (S.started && !S.paused) {
    updatePlayer(dt);
    updateTime(dt);
    updateSanity(dt);
    updateCreature(dt);
    updateNightEvents(dt);
    updateSea(dt);
    updateRain(dt);
  }
  renderer.render(scene, camera);
}

// Start render loop only after scene exists
var waitForScene = setInterval(function() {
  if (renderer && scene && camera) {
    clearInterval(waitForScene);
    animate();
  }
}, 100);

window.addEventListener('resize', function() {
  if (!camera || !renderer) return;
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
